# Pipeline acordado: build + testes + migrate + check:readiness + integracao (Postgres de servico).
name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cobranca_ci
        options: >-
          --health-cmd "pg_isready -U postgres -d cobranca_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/cobranca_ci
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: "0123456789abcdefghijklmnopqrstuvwxyzABCD"
      WEBHOOK_INBOX_SECRET: "whsec_ci_example_min_32_chars____________"
      ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
      PORTAL_CLIENT_URL: "http://localhost:5173"
      # check:readiness usa --strict: nao usar ENABLE_MOCK_AUTH=true aqui.
      ENABLE_MOCK_AUTH: "false"
      # CI nao simula producao no check:prod-env (evita exigir sslmode na URL do servico Postgres).
      NODE_ENV: development

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: Portal web (install + unit tests)
        run: |
          cd apps/portal-web
          npm ci
          npm test

      - name: Migrate
        run: npm run migrate

      - name: Readiness (env + DB + schema)
        run: npm run check:readiness

      - name: Integration tests (incl. Sprint 3 E2E)
        run: npm run test:integration

      - name: Stress POST /v1/portal/clientes (concorrencia controlada)
        run: npm run test:stress:portal-clientes
